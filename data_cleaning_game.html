<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Detective</title>
  </head>
  <body>
    <div class="container">
      <div class="game-title">Data Detective</div>

      <div id="game-area">
        <div class="hud">
          <div class="lives" id="lives-display"></div>
          <div class="timer-bar-wrap">
            <div class="timer-bar" id="timer-bar" style="width: 100%"></div>
          </div>
          <div class="score-lbl">Score: <span id="score-val">0</span></div>
        </div>
        <div class="round-lbl" id="round-lbl">Ronde 1 van 3</div>
        <div class="hint" id="hint-text"></div>
        <div id="table-wrap"></div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div id="end-screen" style="display: none">
        <div class="overlay">
          <h2 id="end-title"></h2>
          <p id="end-msg"></p>
          <div class="end-stats" id="end-stats"></div>
          <button onclick="startGame()">Opnieuw spelen</button>
        </div>
      </div>
    </div>
  </body>
</html>
